name: Hermes Bag Monitor

on:
  schedule:
    - cron: "3/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hermes-bag-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Hermes monitor
        env:
          HERMES_DISCORD_WEBHOOK_URL: ${{ secrets.HERMES_DISCORD_WEBHOOK_URL }}
        run: node hermes-monitor.mjs

      - name: Save Hermes monitor state if changed
        run: |
          if [ -n "$(git status --porcelain hermes-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add hermes-state.json
            git commit -m "Update Hermes bag monitor state"
            git push
          else
            echo "No Hermes state changes."
          fi
